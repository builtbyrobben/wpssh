name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      - name: Install dependencies
        run: go mod download

      - name: Run fmt-check
        run: make fmt-check

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test
